<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國中資優數學：動態行程問題</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel -->
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入 Lucide 圖示庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // Lucide Icon 橋接器
    // ==========================================
    const createIcon = (iconName) => ({ size = 24, className = "", fill = "none" }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide && window.lucide.icons[iconName]) {
          ref.current.innerHTML = '';
          const svg = window.lucide.createElement(window.lucide.icons[iconName]);
          svg.setAttribute('width', size);
          svg.setAttribute('height', size);
          if (fill !== "none") svg.setAttribute('fill', fill);
          if (className) svg.setAttribute('class', className);
          ref.current.appendChild(svg);
        }
      }, [size, className, fill]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
    };

    // 建立程式碼中會用到的所有圖示
    const Play = createIcon('Play');
    const Pause = createIcon('Pause');
    const RotateCcw = createIcon('RotateCcw');
    const Flag = createIcon('Flag');
    const Info = createIcon('Info');
    const Gauge = createIcon('Gauge');
    const FastForward = createIcon('FastForward');
    const Calculator = createIcon('Calculator');
    const ArrowRightLeft = createIcon('ArrowRightLeft');


    // ==========================================
    // 共用組件
    // ==========================================
    const Card = ({ title, children, className = "" }) => (
      <div className={`bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden ${className}`}>
        <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
          <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
            {title}
          </h2>
        </div>
        <div className="p-6">{children}</div>
      </div>
    );

    const Button = ({ onClick, children, variant = "primary", disabled = false, className = "" }) => {
      const baseStyle = "px-4 py-2 rounded-lg font-semibold flex items-center gap-2 transition-all active:scale-95 text-sm md:text-base";
      const variants = {
        primary: "bg-blue-600 text-white hover:bg-blue-700 disabled:bg-blue-300",
        secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200 disabled:bg-slate-50 disabled:text-slate-400",
        outline: "border-2 border-slate-200 text-slate-600 hover:border-slate-300 hover:bg-slate-50",
      };
      return (
        <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`} disabled={disabled}>
          {children}
        </button>
      );
    };

    const SpeedControl = ({ speed, setSpeed }) => (
      <div className="flex items-center gap-3 bg-slate-100 px-3 py-2 rounded-lg border border-slate-200 w-full md:w-auto">
        <Gauge size={16} className="text-slate-500" />
        <span className="text-xs font-bold text-slate-500 whitespace-nowrap w-16">速度 {speed.toFixed(1)}x</span>
        <input
          type="range"
          min="0.1"
          max="3.0"
          step="0.1"
          value={speed}
          onChange={(e) => setSpeed(parseFloat(e.target.value))}
          className="w-24 md:w-32 h-2 bg-slate-300 rounded-lg appearance-none cursor-pointer accent-slate-600"
        />
      </div>
    );

    // ==========================================
    // 第一題：直線相遇問題
    // ==========================================
    const LinearProblem = () => {
      const [time, setTime] = useState(0); 
      const [isPlaying, setIsPlaying] = useState(false);
      const [playbackSpeed, setPlaybackSpeed] = useState(1.0); 
      const requestRef = useRef();
      
      const TOTAL_MINUTES = 180;
      const BASE_SPEED = 0.2; 

      const Va = 1.25; 
      const Vb = 1.0;  
      const TOTAL_DIST = 150; 
      
      // 計算位置函數
      const getPosA = (t) => {
        const travelTime = t; 
        if (travelTime < 0) return 0;
        const dist = Va * travelTime;
        return Math.min(dist, TOTAL_DIST);
      };

      const getPosB = (t) => {
        const travelTime = t - 30;
        if (travelTime < 0) return TOTAL_DIST; 
        const dist = Vb * travelTime;
        return Math.max(TOTAL_DIST - dist, 0);
      };

      const animate = () => {
        setTime(prev => {
          if (prev >= TOTAL_MINUTES) {
            setIsPlaying(false);
            return prev;
          }
          return prev + (BASE_SPEED * playbackSpeed);
        });
        requestRef.current = requestAnimationFrame(animate);
      };

      useEffect(() => {
        if (isPlaying) {
          requestRef.current = requestAnimationFrame(animate);
        } else {
          cancelAnimationFrame(requestRef.current);
        }
        return () => cancelAnimationFrame(requestRef.current);
      }, [isPlaying, playbackSpeed]);

      const formatTime = (minutes) => {
        const h = 7 + Math.floor((30 + minutes) / 60);
        const m = Math.floor((30 + minutes) % 60); 
        return `${h}:${m.toString().padStart(2, '0')}`;
      };

      const posA = getPosA(time);
      const posB = getPosB(time);
      
      // 軌道參數：左右各留 2rem (32px) 的 padding
      const getStyleLeft = (dist) => {
        const ratio = dist / TOTAL_DIST;
        return { left: `calc(2rem + (100% - 4rem) * ${ratio})` };
      };

      // 相遇點比率 (100km / 150km)
      const meetingRatio = 100 / 150;

      return (
        <div className="flex flex-col gap-6">
          <div className="flex flex-col md:flex-row justify-between items-center bg-slate-50 p-4 rounded-lg gap-4 border border-slate-200">
            <div className="flex items-center gap-4">
              <div className="text-3xl font-mono font-bold text-blue-900 bg-white px-4 py-2 rounded border border-blue-200 shadow-sm min-w-[140px] text-center">
                {formatTime(time)}
              </div>
              <div className="text-sm text-slate-500 space-y-1">
                <p>已過時間 (t): <span className="font-bold text-slate-800">{Math.floor(time)} 分鐘</span></p>
                <p>相遇時刻: <span className="font-bold text-slate-800">8:50 (t=80)</span></p>
              </div>
            </div>
            
            <div className="flex flex-col md:flex-row items-center gap-3 w-full md:w-auto">
              <SpeedControl speed={playbackSpeed} setSpeed={setPlaybackSpeed} />
              <div className="flex gap-2 w-full md:w-auto justify-center">
                <Button onClick={() => setIsPlaying(!isPlaying)} variant={isPlaying ? "secondary" : "primary"}>
                  {isPlaying ? <Pause size={18} /> : <Play size={18} />}
                  {isPlaying ? "暫停" : "開始"}
                </Button>
                <Button onClick={() => { setTime(0); setIsPlaying(false); }} variant="secondary">
                  <RotateCcw size={18} />
                </Button>
              </div>
            </div>
          </div>

          {/* 視覺化軌道區域 */}
          <div className="relative h-48 bg-slate-50 rounded-xl border border-slate-200 p-8 select-none overflow-hidden">
            {/* 地標文字 */}
            <div className="absolute top-8 left-8 text-slate-400 font-bold">甲地 (A)</div>
            <div className="absolute top-8 right-8 text-slate-400 font-bold">乙地 (B)</div>
            
            {/* 軌道線 (背景) */}
            <div className="absolute top-20 left-8 right-8 h-2 bg-slate-200 rounded-full z-0"></div>

            {/* 相遇點標記 */}
            <div 
              className="absolute top-24 h-full border-l border-dashed border-slate-300 flex flex-col items-center z-0"
              style={{ left: `calc(2rem + (100% - 4rem) * ${meetingRatio})` }}
            >
               <span className="bg-slate-100 text-[10px] text-slate-500 px-1 mt-2 whitespace-nowrap border border-slate-200 rounded">
                 100km 處
               </span>
            </div>

            {/* 甲 (紅) */}
            <div 
              className="absolute top-16 flex flex-col items-center z-20"
              style={getStyleLeft(posA)}
            >
              <div className="w-8 h-8 bg-red-500 rounded-full shadow-lg flex items-center justify-center text-white font-bold text-xs border-2 border-white">
                甲
              </div>
              <div className="text-xs text-red-600 font-bold mt-1 whitespace-nowrap">{Math.round(posA)}km</div>
            </div>

            {/* 乙 (藍) */}
            <div 
              className="absolute top-16 flex flex-col items-center z-20"
              style={getStyleLeft(posB)}
            >
              <div className="w-8 h-8 bg-blue-500 rounded-full shadow-lg flex items-center justify-center text-white font-bold text-xs border-2 border-white translate-y-8">
                乙
              </div>
              <div className="text-xs text-blue-600 font-bold mt-9 whitespace-nowrap">{Math.round(TOTAL_DIST - posB)}km</div>
            </div>

            {/* 相遇 Flag */}
            {time >= 80 && (
              <div 
                className="absolute top-12 text-amber-500 font-bold animate-bounce flex flex-col items-center z-30"
                style={{ 
                  left: `calc(2rem + (100% - 4rem) * ${meetingRatio})`,
                  transform: 'translateX(-50%)' 
                }}
              >
                 <Flag size={20} fill="currentColor" />
                 <span className="text-xs bg-white/80 px-1 rounded backdrop-blur-sm">相遇!</span>
              </div>
            )}
          </div>

          <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 text-sm text-blue-800">
            <h3 className="font-bold mb-2 flex items-center gap-2"><Info size={16}/> 教學提點</h3>
            <ul className="list-disc pl-5 space-y-1">
              <li><strong>07:30 - 08:00</strong>：請觀察只有<strong>甲（紅色）</strong>在移動。乙車此時靜止在最右側（起點）。</li>
              <li><strong>08:00</strong>：乙車（藍色）開始向左移動，兩人開始相向而行。</li>
              <li>相遇點標記在 <strong>100km</strong> 處（2/3 位置）。相遇後可觀察甲只需再走一小段路，而乙還有很長一段路要走。</li>
            </ul>
          </div>
          
          {/* 拖動條控制時間 */}
          <div className="px-2">
            <input 
              type="range" 
              min="0" 
              max="180" 
              value={time} 
              onChange={(e) => {
                setTime(parseFloat(e.target.value));
                setIsPlaying(false);
              }}
              className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
            />
            <div className="flex justify-between text-xs text-slate-400 mt-2">
              <span>7:30</span>
              <span>8:00</span>
              <span>8:50 (相遇)</span>
              <span>9:30</span>
              <span>10:30</span>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 第二題：圓形跑道
    // ==========================================
    const CircularProblem = () => {
      const k = (1 + Math.sqrt(17)) / 4; 
      const Vb = 1; 
      const Va = k; 
      
      const t1 = 1 / (k - 1); 
      const t2 = 1 / (k + 1); 
      const totalSimTime = t1 + t2;

      const [simTime, setSimTime] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [playbackSpeed, setPlaybackSpeed] = useState(1.0);
      const requestRef = useRef();

      const BASE_STEP = 0.005;

      const animate = () => {
        setSimTime(prev => {
          const next = prev + (BASE_STEP * playbackSpeed);
          if (next >= totalSimTime) {
            setIsPlaying(false);
            return totalSimTime;
          }
          return next;
        });
        requestRef.current = requestAnimationFrame(animate);
      };

      useEffect(() => {
        if (isPlaying) {
          requestRef.current = requestAnimationFrame(animate);
        } else {
          cancelAnimationFrame(requestRef.current);
        }
        return () => cancelAnimationFrame(requestRef.current);
      }, [isPlaying, playbackSpeed]);

      const jumpToPhase1End = () => {
        setSimTime(t1);
        setIsPlaying(false);
      };

      const currentPhase = simTime <= t1 + 0.0001 ? 1 : 2; 
      
      let posA, posB;
      let distA, distB;

      if (currentPhase === 1) {
        posA = (Va * simTime);
        posB = (Vb * simTime);
        distA = posA;
        distB = posB;
      } else {
        const endP1_A = Va * t1;
        const endP1_B = Vb * t1;
        const dt = simTime - t1;
        posA = endP1_A - (Va * dt); // 逆行
        posB = endP1_B + (Vb * dt); // 順行
        distA = endP1_A + (Va * dt); // 累計距離
        distB = endP1_B + (Vb * dt); // 累計距離
      }

      const getAngle = (pos) => (pos % 1) * 2 * Math.PI;

      const cx = 150, cy = 150, r = 100; // 單一跑道半徑

      const polarToCartesian = (angle) => {
        const rad = angle - Math.PI / 2;
        return {
          x: cx + r * Math.cos(rad),
          y: cy + r * Math.sin(rad)
        };
      };

      const coordA = polarToCartesian(getAngle(posA));
      const coordB = polarToCartesian(getAngle(posB));

      const isPhase1End = Math.abs(simTime - t1) < 0.02;

      return (
        <div className="flex flex-col md:flex-row gap-8 items-center justify-center">
          
          <div className="relative w-[300px] h-[300px] md:w-auto md:h-auto">
            <svg width="300" height="300" viewBox="0 0 300 300" className="drop-shadow-xl bg-white rounded-full border border-slate-100 max-w-full h-auto">
              {/* 跑道 */}
              <circle cx={cx} cy={cy} r={r} fill="none" stroke="#e2e8f0" strokeWidth="20" />
              <circle cx={cx} cy={cy} r={r} fill="none" stroke="#cbd5e1" strokeWidth="1" strokeDasharray="5,5" />
              
              <line x1={cx} y1={cy - r - 10} x2={cx} y2={cy - r + 10} stroke="#94a3b8" strokeWidth="2" />
              <text x={cx} y={cy - r - 20} textAnchor="middle" className="text-xs fill-slate-500">起點</text>

              {/* 甲 (紅) - r=6 */}
              <circle cx={coordA.x} cy={coordA.y} r="6" fill="#ef4444" stroke="white" strokeWidth="2" />
              
              {/* 乙 (藍) - r=8 */}
              <circle cx={coordB.x} cy={coordB.y} r="8" fill="#3b82f6" stroke="white" strokeWidth="2" fillOpacity="0.8" />
              
              {/* Phase 2 顯示逆行指示 */}
              {currentPhase === 2 && (
                 <path d={`M ${coordA.x} ${coordA.y} l -5 5`} stroke="red" strokeWidth="1" />
              )}

              <text x={coordA.x} y={coordA.y - 12} textAnchor="middle" className="text-xs font-bold fill-red-600 pointer-events-none">甲</text>
              <text x={coordB.x} y={coordB.y + 20} textAnchor="middle" className="text-xs font-bold fill-blue-600 pointer-events-none">乙</text>
            </svg>

            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center pointer-events-none">
              <div className="text-xs text-slate-400 mb-1">階段</div>
              <div className={`text-xl font-bold ${currentPhase === 1 ? 'text-green-600' : 'text-purple-600'}`}>
                {currentPhase === 1 ? "追趕中" : "折返中"}
              </div>
              {currentPhase === 2 && (
                 <div className="flex items-center justify-center gap-1 text-[10px] text-purple-400 font-bold bg-white/80 px-2 rounded-full mt-1">
                   <ArrowRightLeft size={10} /> 甲逆行
                 </div>
              )}
            </div>
          </div>

          <div className="flex-1 w-full max-w-md space-y-6">
            
            <div className="grid grid-cols-2 gap-4">
              <div className="bg-red-50 p-4 rounded-xl border border-red-100 text-center relative overflow-hidden">
                 <div className="text-sm text-red-600 mb-1 font-bold">甲跑的圈數</div>
                 <div className="text-3xl font-mono font-bold text-red-800">{distA.toFixed(2)}</div>
                 <div className="text-[10px] text-red-400 mt-1 flex items-center justify-center gap-1">
                   <Calculator size={10} />
                   <span>Total = 4.00 × k</span>
                 </div>
              </div>
              <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 text-center">
                <div className="text-sm text-blue-600 mb-1 font-bold">乙跑的圈數</div>
                <div className="text-3xl font-mono font-bold text-blue-800">{distB.toFixed(2)}</div>
                <div className="text-xs text-blue-400 mt-1">目標: 4.00</div>
              </div>
            </div>

            <div className={`p-3 rounded-lg border text-center transition-all duration-300 ${
              isPhase1End 
                ? 'bg-amber-100 border-amber-300 scale-105 shadow-md' 
                : 'bg-slate-100 border-slate-200 text-slate-500'
            }`}>
                <div className="text-xs mb-1 uppercase tracking-wider font-bold">數學驗證：追及時刻</div>
                <div className="flex justify-center items-center gap-2 font-mono text-lg">
                    <span className="text-red-600 font-bold">{distA.toFixed(2)}</span>
                    <span>-</span>
                    <span className="text-blue-600 font-bold">{distB.toFixed(2)}</span>
                    <span>=</span>
                    <span className={`font-bold ${isPhase1End ? 'text-amber-600 text-xl' : 'text-slate-700'}`}>
                        {(distA - distB).toFixed(2)}
                    </span>
                    <span className="text-xs text-slate-400 ml-1">圈</span>
                </div>
                {isPhase1End && (
                    <div className="text-amber-700 text-xs mt-1 font-bold animate-pulse">
                        ✨ 剛好相差 1.00 圈！
                    </div>
                )}
            </div>

            <div className="space-y-2">
                <div className="flex justify-between text-sm text-slate-500">
                    <span>Start</span>
                    <span>追上 (Phase 1)</span>
                    <span>End</span>
                </div>
                <div className="h-2 bg-slate-200 rounded-full overflow-hidden relative">
                    <div 
                        className="h-full bg-indigo-500 transition-all duration-75"
                        style={{ width: `${(simTime / totalSimTime) * 100}%` }}
                    ></div>
                    <div className="absolute top-0 bottom-0 w-0.5 bg-white/50" style={{ left: `${(t1/totalSimTime)*100}%` }}></div>
                </div>
                <input 
                  type="range" 
                  min="0" 
                  max={totalSimTime} 
                  step="0.01"
                  value={simTime} 
                  onChange={(e) => {
                    setSimTime(parseFloat(e.target.value));
                    setIsPlaying(false);
                  }}
                  className="w-full h-4 bg-transparent cursor-pointer"
                />
            </div>

            <div className="flex flex-col gap-3">
               <div className="flex flex-col md:flex-row gap-3 items-center justify-between">
                  <SpeedControl speed={playbackSpeed} setSpeed={setPlaybackSpeed} />
                  <Button onClick={jumpToPhase1End} variant="outline" className="w-full md:w-auto text-xs py-1">
                     <FastForward size={14} /> 跳轉到「追上瞬間」
                  </Button>
               </div>

               <div className="flex gap-2 justify-center w-full">
                 <Button onClick={() => setIsPlaying(!isPlaying)} variant={isPlaying ? "secondary" : "primary"} className="flex-1 justify-center">
                  {isPlaying ? <Pause size={18} /> : <Play size={18} />}
                  {isPlaying ? "暫停" : "開始"}
                </Button>
                <Button onClick={() => { setSimTime(0); setIsPlaying(false); }} variant="secondary">
                  <RotateCcw size={18} />
                </Button>
               </div>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 主應用程式入口
    // ==========================================
    const App = () => {
      const [activeTab, setActiveTab] = useState('linear');

      return (
        <div className="min-h-screen bg-slate-100 p-4 md:p-8 font-sans text-slate-800">
          <div className="max-w-4xl mx-auto space-y-8">
            
            <header className="text-center space-y-2">
              <h1 className="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">
                國中資優數學：動態行程問題
              </h1>
              <p className="text-slate-500">
                針對「相遇問題」與「圓形跑道」的互動式視覺驗證
              </p>
            </header>

            <div className="flex justify-center gap-4">
              <button
                onClick={() => setActiveTab('linear')}
                className={`px-6 py-2 rounded-full font-bold transition-all ${
                  activeTab === 'linear' 
                    ? 'bg-blue-600 text-white shadow-lg scale-105' 
                    : 'bg-white text-slate-500 hover:bg-slate-50'
                }`}
              >
                題目一：兩人相遇
              </button>
              <button
                onClick={() => setActiveTab('circular')}
                className={`px-6 py-2 rounded-full font-bold transition-all ${
                  activeTab === 'circular' 
                    ? 'bg-purple-600 text-white shadow-lg scale-105' 
                    : 'bg-white text-slate-500 hover:bg-slate-50'
                }`}
              >
                題目二：圓形跑道
              </button>
            </div>

            <main>
              {activeTab === 'linear' ? (
                <Card title="兩人相遇模擬 (Linear Motion)">
                   <LinearProblem />
                </Card>
              ) : (
                <Card title="圓形跑道追及與折返 (Circular Motion)">
                   <CircularProblem />
                </Card>
              )}
            </main>

            <footer className="text-center text-slate-400 text-sm mt-12">
              Designed for Math Gifted Class Instruction
            </footer>
          </div>
        </div>
      );
    };

    // 將 React 元件渲染到畫面上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
