<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>螺旋座標規律探究 (資優教學版)</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 讓瀏覽器即時編譯 JSX -->
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>

  <!-- 引入 Lucide 圖示庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* 確保畫布區域不出現預期外的捲軸 */
    body { overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // Lucide Icon 橋接器
    // ==========================================
    const createIcon = (iconName) => ({ size = 24, className = "" }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide && window.lucide.icons[iconName]) {
          ref.current.innerHTML = '';
          const svg = window.lucide.createElement(window.lucide.icons[iconName]);
          svg.setAttribute('width', size);
          svg.setAttribute('height', size);
          if (className) svg.setAttribute('class', className);
          ref.current.appendChild(svg);
        }
      }, [size, className]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
    };

    // 建立程式碼中會用到的所有圖示
    const Play = createIcon('Play');
    const Pause = createIcon('Pause');
    const RotateCcw = createIcon('RotateCcw');
    const Info = createIcon('Info');
    const Search = createIcon('Search');
    const Move = createIcon('Move');
    const Zap = createIcon('Zap');
    const Crosshair = createIcon('Crosshair');
    const MousePointer2 = createIcon('MousePointer2');

    // ==========================================
    // 螺旋座標核心應用程式
    // ==========================================
    const App = () => {
      // 狀態管理
      const [targetN, setTargetN] = useState(2025);
      const [currentN, setCurrentN] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [speed, setSpeed] = useState(100);
      const [activePattern, setActivePattern] = useState('bottomRight'); // bottomRight, topLeft, topRight, bottomLeft, none
      const [reverseX, setReverseX] = useState(0);
      const [reverseY, setReverseY] = useState(0);
      
      // 畫布視角控制
      const [pan, setPan] = useState({ x: 0, y: 0 });
      const [zoom, setZoom] = useState(20); // 預設每單位 20px
      const isDragging = useRef(false);
      const lastMousePos = useRef({ x: 0, y: 0 });
      
      const canvasRef = useRef(null);

      // --- 核心數學邏輯 ---
      const getCoords = (n) => {
        if (n === 1) return { x: 0, y: 0 };
        let k = Math.ceil((Math.sqrt(n) - 1) / 2);
        let prevSquare = (k === 0) ? 0 : Math.pow(2 * k - 1, 2);
        let side = 2 * k; 
        let pos = n - prevSquare;
        
        if (pos <= side) return { x: k, y: -(k - 1) + (pos - 1) };
        pos -= side;
        if (pos <= side) return { x: k - pos, y: k };
        pos -= side;
        if (pos <= side) return { x: -k, y: k - pos };
        pos -= side;
        if (pos <= side) return { x: -k + pos, y: -k };
        return { x: k, y: -k };
      };

      const getN = (x, y) => {
        let k = Math.max(Math.abs(x), Math.abs(y));
        if (k === 0) return 1;
        let prevSquare = Math.pow(2 * k - 1, 2);
        let side = 2 * k;
        if (x === k && y > -k) return prevSquare + (y - (-(k - 1)) + 1);
        if (y === k && x < k) return prevSquare + side + (k - x);
        if (x === -k && y < k) return prevSquare + 2 * side + (k - y);
        if (y === -k && x > -k) return prevSquare + 3 * side + (x - (-k));
        return Math.pow(2 * k + 1, 2);
      };

      const getPatternPoints = (type, limitK = 100) => {
        const points = [];
        for(let k=1; k<=limitK; k++) {
          if (type === 'bottomRight') points.push({ n: Math.pow(2*k+1, 2), x: k, y: -k });
          if (type === 'topLeft') points.push({ n: Math.pow(2*k, 2) + 1, x: -k, y: k });
          if (type === 'topRight') points.push({ n: 4*k*k - 2*k + 1, x: k, y: k });
          if (type === 'bottomLeft') points.push({ n: 4*k*k + 2*k + 1, x: -k, y: -k });
        }
        return points;
      };

      // --- 畫布互動事件 ---
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const handleWheel = (e) => {
          e.preventDefault(); // 防止頁面滾動
          setZoom(prev => Math.max(2, Math.min(100, prev - e.deltaY * 0.02)));
        };

        canvas.addEventListener('wheel', handleWheel, { passive: false });
        return () => canvas.removeEventListener('wheel', handleWheel);
      }, []);

      const handleMouseDown = (e) => {
        isDragging.current = true;
        lastMousePos.current = { x: e.clientX, y: e.clientY };
      };

      const handleMouseMove = (e) => {
        if (!isDragging.current) return;
        const dx = e.clientX - lastMousePos.current.x;
        const dy = e.clientY - lastMousePos.current.y;
        setPan(prev => ({ x: prev.x + dx, y: prev.y + dy }));
        lastMousePos.current = { x: e.clientX, y: e.clientY };
      };

      const handleMouseUpOrLeave = () => {
        isDragging.current = false;
      };

      // 聚焦到機器人
      const focusOnRobot = () => {
        const coords = getCoords(currentN);
        setPan({ x: -coords.x * zoom, y: coords.y * zoom });
      };
      
      // 回到原點
      const resetCamera = () => {
        setPan({ x: 0, y: 0 });
        setZoom(20);
      };

      // --- 繪製畫布 ---
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        
        // 計算畫布中心的絕對座標
        const cx = width / 2 + pan.x;
        const cy = height / 2 + pan.y;

        ctx.clearRect(0, 0, width, height);

        // 計算當前視角可見的數學座標範圍
        const leftEdge = Math.floor((-cx) / zoom);
        const rightEdge = Math.ceil((width - cx) / zoom);
        const bottomEdge = Math.floor((cy - height) / zoom);
        const topEdge = Math.ceil(cy / zoom);

        // --- 動態計算格線間距 (避免縮小後格線密密麻麻) ---
        let step = 1;
        const minGridSpacingPx = 60; // 畫面上的格線之間至少保持 60px 的距離
        while (step * zoom < minGridSpacingPx) {
          if (step.toString().startsWith('1')) step *= 2;      // 1 -> 2, 10 -> 20, 100 -> 200
          else if (step.toString().startsWith('2')) step *= 2.5; // 2 -> 5, 20 -> 50, 200 -> 500
          else step *= 2;                                      // 5 -> 10, 50 -> 100
        }

        // 繪製網格與座標軸數字
        ctx.strokeStyle = '#e2e8f0'; // 網格顏色
        ctx.lineWidth = 1;
        ctx.font = '10px Inter';
        ctx.fillStyle = '#94a3b8';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const startX = Math.floor(leftEdge / step) * step;
        for (let x = startX; x <= rightEdge; x += step) {
          ctx.beginPath();
          ctx.moveTo(cx + x * zoom, 0);
          ctx.lineTo(cx + x * zoom, height);
          ctx.stroke();
          
          // 在 X 軸上畫刻度數字 (避開原點)
          if (x !== 0 && cy > 0 && cy < height) {
            ctx.fillText(x.toString(), cx + x * zoom, cy + 12);
          }
        }

        const startY = Math.floor(bottomEdge / step) * step;
        for (let y = startY; y <= topEdge; y += step) {
          ctx.beginPath();
          ctx.moveTo(0, cy - y * zoom);
          ctx.lineTo(width, cy - y * zoom);
          ctx.stroke();
          
          // 在 Y 軸上畫刻度數字 (避開原點)
          if (y !== 0 && cx > 0 && cx < width) {
            ctx.textAlign = 'right';
            ctx.fillText(y.toString(), cx - 8, cy - y * zoom);
          }
        }
        ctx.textAlign = 'left'; // 恢復預設

        // 繪製座標軸
        ctx.strokeStyle = '#94a3b8';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, cy); ctx.lineTo(width, cy); // X 軸
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, 0); ctx.lineTo(cx, height); // Y 軸
        ctx.stroke();

        // 繪製機器人走過的路徑 (優化：只畫目前縮放看得到或有意義的部分)
        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        
        for (let i = 1; i <= currentN; i++) {
          const p = getCoords(i);
          ctx.lineTo(cx + p.x * zoom, cy - p.y * zoom);
        }
        ctx.stroke();

        // 繪製轉折規律點
        if (activePattern !== 'none') {
          // 動態增加計算點的數量，確保拉遠時也看得到規律
          const patternPoints = getPatternPoints(activePattern, Math.max(100, Math.ceil(Math.max(Math.abs(rightEdge), Math.abs(topEdge)))));
          
          // 計算當前縮放層級下，每隔幾個點顯示一次文字，避免文字重疊
          const textSkip = Math.ceil(25 / zoom);

          patternPoints.forEach((pt, index) => {
            // 只畫在畫面內的點
            if (pt.x >= leftEdge - 1 && pt.x <= rightEdge + 1 && pt.y >= bottomEdge - 1 && pt.y <= topEdge + 1) {
              const dotRadius = Math.max(5, zoom * 0.2); // 確保縮小極限時，點的半徑至少有 5px
              
              ctx.fillStyle = '#f43f5e';
              ctx.beginPath();
              ctx.arc(cx + pt.x * zoom, cy - pt.y * zoom, dotRadius, 0, Math.PI * 2);
              ctx.fill();
              
              // 動態決定是否顯示文字
              if (index % textSkip === 0 || pt.n === targetN) {
                const textX = cx + pt.x * zoom + dotRadius + 6;
                const textY = cy - pt.y * zoom + 5;
                
                ctx.font = 'bold 13px Inter'; // 加大字體
                // 畫文字白邊，增加在網格或線條上的辨識度
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
                ctx.lineWidth = 4;
                ctx.strokeText(`A_${pt.n}`, textX, textY);
                
                ctx.fillStyle = '#be123c'; // 深紅文字
                ctx.fillText(`A_${pt.n}`, textX, textY);
              }
            }
          });
        }

        // 繪製機器人本體
        const lastP = getCoords(currentN);
        const rX = cx + lastP.x * zoom;
        const rY = cy - lastP.y * zoom;
        
        ctx.fillStyle = '#1e293b';
        ctx.beginPath();
        const robotSize = Math.max(12, zoom * 0.5); // 機器人大小隨縮放，但有最小值
        ctx.roundRect(rX - robotSize/2, rY - robotSize/2, robotSize, robotSize, 4);
        ctx.fill();
        
        // 機器人眼睛
        ctx.fillStyle = '#22d3ee';
        ctx.beginPath();
        ctx.arc(rX - robotSize*0.2, rY - robotSize*0.1, robotSize*0.1, 0, Math.PI * 2);
        ctx.arc(rX + robotSize*0.2, rY - robotSize*0.1, robotSize*0.1, 0, Math.PI * 2);
        ctx.fill();

      }, [currentN, activePattern, pan, zoom]);

      // --- 動態播放邏輯 ---
      useEffect(() => {
        let timer;
        if (isPlaying) {
          if (currentN < targetN) {
            timer = setTimeout(() => setCurrentN(prev => prev + 1), 1000 / speed);
          } else if (currentN > targetN) {
            timer = setTimeout(() => setCurrentN(prev => prev - 1), 1000 / speed);
          } else {
            setIsPlaying(false); // 抵達終點自動暫停
          }
        }
        return () => clearTimeout(timer);
      }, [isPlaying, currentN, targetN, speed]);

      const togglePlayPause = () => setIsPlaying(!isPlaying);

      const handleReverseSearchWalk = () => {
        const x = parseInt(reverseX) || 0;
        const y = parseInt(reverseY) || 0;
        const foundN = getN(x, y);
        setTargetN(foundN);
        setIsPlaying(true);
      };

      const handleReverseSearchJump = () => {
        const x = parseInt(reverseX) || 0;
        const y = parseInt(reverseY) || 0;
        const foundN = getN(x, y);
        setTargetN(foundN);
        setCurrentN(foundN);
        setIsPlaying(false);
        setPan({ x: -x * zoom, y: y * zoom }); // 視角切換過去
      };

      const currentCoords = getCoords(currentN);

      return (
        <div className="flex flex-col h-screen bg-slate-50 text-slate-900">
          <header className="bg-white border-b px-6 py-4 flex justify-between items-center z-20 shadow-sm">
            <div className="flex items-center gap-3">
              <div className="p-2 bg-indigo-600 rounded-lg text-white">
                <Move size={24} />
              </div>
              <div>
                <h1 className="text-xl font-bold text-slate-800">螺旋座標規律探究 (資優教學版)</h1>
                <p className="text-xs text-slate-500 font-medium">支援自由縮放視角與多維度轉折點分析</p>
              </div>
            </div>
            <div className="flex gap-2">
               <button onClick={resetCamera} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg flex items-center gap-1 font-semibold transition-colors">
                  <Crosshair size={14} /> 原點置中
               </button>
               <button onClick={focusOnRobot} className="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-lg flex items-center gap-1 font-semibold transition-colors">
                  <MousePointer2 size={14} /> 追蹤機器人
               </button>
            </div>
          </header>

          <main className="flex flex-1 overflow-hidden">
            {/* 左側控制區域 */}
            <aside className="w-96 bg-white border-r flex flex-col z-10 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
              
              <div className="p-5 flex-1 overflow-y-auto space-y-6">
                {/* 第一區塊：正向探究 */}
                <section className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                  <h2 className="flex items-center gap-2 font-bold text-indigo-700 mb-3">
                    <span className="w-5 h-5 rounded flex items-center justify-center bg-indigo-100 text-xs">1</span>
                    正向探索：輸入序號 n
                  </h2>
                  <div className="space-y-3">
                    <input 
                      type="number" 
                      value={targetN}
                      onChange={(e) => setTargetN(Math.max(1, parseInt(e.target.value) || 1))}
                      className="w-full border border-slate-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none font-mono text-sm"
                      placeholder="輸入目標 n"
                    />
                    <div className="grid grid-cols-4 gap-2">
                      <button onClick={togglePlayPause} className={`col-span-3 text-white py-2 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors ${isPlaying ? 'bg-amber-500 hover:bg-amber-600' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                        {isPlaying ? <><Pause size={16} /> 暫停行走</> : <><Play size={16} /> 走到目標點</>}
                      </button>
                      <button onClick={() => { setCurrentN(1); setIsPlaying(false); }} className="bg-slate-200 text-slate-600 py-2 rounded-xl flex items-center justify-center hover:bg-slate-300">
                        <RotateCcw size={16} />
                      </button>
                    </div>
                    <div>
                      <div className="flex justify-between mb-1">
                        <label className="text-[10px] font-bold text-slate-400 uppercase">行走速度</label>
                      </div>
                      <input type="range" min="10" max="500" value={speed} onChange={(e) => setSpeed(parseInt(e.target.value))} className="w-full accent-indigo-600 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                    </div>
                  </div>
                </section>

                {/* 第二區塊：逆向挑戰 */}
                <section className="bg-emerald-50/50 p-4 rounded-2xl border border-emerald-100">
                  <h2 className="flex items-center gap-2 font-bold text-emerald-700 mb-3">
                    <span className="w-5 h-5 rounded flex items-center justify-center bg-emerald-100 text-xs">2</span>
                    逆向挑戰：尋找座標點
                  </h2>
                  <div className="grid grid-cols-2 gap-2 mb-3">
                    <input type="number" value={reverseX} onChange={(e) => setReverseX(e.target.value)} className="w-full border border-slate-200 rounded-xl px-3 py-2 focus:ring-2 focus:ring-emerald-500 outline-none font-mono text-sm" placeholder="X 座標" />
                    <input type="number" value={reverseY} onChange={(e) => setReverseY(e.target.value)} className="w-full border border-slate-200 rounded-xl px-3 py-2 focus:ring-2 focus:ring-emerald-500 outline-none font-mono text-sm" placeholder="Y 座標" />
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <button onClick={handleReverseSearchWalk} className="bg-emerald-100 text-emerald-700 py-2 rounded-xl font-bold flex items-center justify-center gap-1 hover:bg-emerald-200 text-xs transition-colors">
                      <Play size={14} /> 走過去
                    </button>
                    <button onClick={handleReverseSearchJump} className="bg-emerald-600 text-white py-2 rounded-xl font-bold flex items-center justify-center gap-1 hover:bg-emerald-700 text-xs shadow-sm transition-colors">
                      <Zap size={14} /> 瞬間閃現
                    </button>
                  </div>
                </section>

                {/* 第三區塊：轉折點規律 */}
                <section>
                  <h2 className="flex items-center gap-2 font-bold text-slate-700 mb-3 text-sm">
                    📐 四象限轉折點規律標示
                  </h2>
                  <div className="grid grid-cols-2 gap-2">
                    <button onClick={() => setActivePattern('topLeft')} className={`py-2 px-2 text-xs font-bold rounded-lg border text-left transition-all ${activePattern === 'topLeft' ? 'bg-rose-50 border-rose-500 text-rose-700' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                      ↖ 左上 (第2象限) <br/><span className="font-mono text-[10px] font-normal opacity-80">(2k)² + 1</span>
                    </button>
                    <button onClick={() => setActivePattern('topRight')} className={`py-2 px-2 text-xs font-bold rounded-lg border text-left transition-all ${activePattern === 'topRight' ? 'bg-rose-50 border-rose-500 text-rose-700' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                      ↗ 右上 (第1象限) <br/><span className="font-mono text-[10px] font-normal opacity-80">4k² - 2k + 1</span>
                    </button>
                    <button onClick={() => setActivePattern('bottomLeft')} className={`py-2 px-2 text-xs font-bold rounded-lg border text-left transition-all ${activePattern === 'bottomLeft' ? 'bg-rose-50 border-rose-500 text-rose-700' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                      ↙ 左下 (第3象限) <br/><span className="font-mono text-[10px] font-normal opacity-80">4k² + 2k + 1</span>
                    </button>
                    <button onClick={() => setActivePattern('bottomRight')} className={`py-2 px-2 text-xs font-bold rounded-lg border text-left transition-all ${activePattern === 'bottomRight' ? 'bg-rose-50 border-rose-500 text-rose-700' : 'bg-white border-slate-200 text-slate-500 hover:bg-slate-50'}`}>
                      ↘ 右下 (第4象限) <br/><span className="font-mono text-[10px] font-normal opacity-80">(2k + 1)²</span>
                    </button>
                  </div>
                  <button onClick={() => setActivePattern('none')} className="mt-2 w-full py-1.5 text-xs text-slate-400 hover:text-slate-600 transition-colors">
                    關閉規律標示
                  </button>
                </section>
              </div>
              
              {/* 教學說明視窗 */}
              <div className="bg-slate-800 p-5 text-white">
                <h3 className="text-indigo-300 font-bold flex items-center gap-2 mb-2 text-sm">
                  <Info size={16} /> 資優班教學提問提示
                </h3>
                <p className="text-xs leading-relaxed text-slate-300 opacity-90 mb-2">
                  「除了右下角的奇數平方，機器人在其他轉角處的座標與數字，是否也存在多項式規律呢？」
                </p>
                <div className="text-[10px] bg-slate-900/50 p-2 rounded font-mono text-emerald-300 space-y-1">
                  {activePattern === 'bottomRight' && <p>目前標示：奇數平方 A_((2k+1)²) = (k, -k)</p>}
                  {activePattern === 'topLeft' && <p>目前標示：偶數平方加一 A_((2k)²+1) = (-k, k)</p>}
                  {activePattern === 'topRight' && <p>目前標示：A_(4k²-2k+1) = (k, k)</p>}
                  {activePattern === 'bottomLeft' && <p>目前標示：A_(4k²+2k+1) = (-k, -k)</p>}
                  {activePattern === 'none' && <p>請點擊上方按鈕開啟各象限規律點</p>}
                </div>
              </div>
            </aside>

            {/* 畫布顯示區 */}
            <div className="flex-1 relative bg-[#e2e8f0] flex items-center justify-center overflow-hidden">
              
              {/* 操作提示浮水印 */}
              <div className="absolute top-4 right-6 text-slate-400 text-xs font-medium z-10 pointer-events-none flex items-center gap-2 bg-white/50 px-3 py-1.5 rounded-full backdrop-blur">
                <MousePointer2 size={12} /> 滑鼠拖曳平移畫布，滾輪縮放視野
              </div>

              {/* 狀態卡片 (跟隨在左上角) */}
              <div className="absolute top-6 left-6 flex flex-col gap-3 z-10 pointer-events-none">
                <div className="bg-white/90 backdrop-blur shadow-lg rounded-xl p-3 border border-slate-200 min-w-[140px]">
                  <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-0.5">目前序號 n</span>
                  <span className="text-2xl font-black text-indigo-600 font-mono">A_{currentN}</span>
                </div>
                <div className="bg-white/90 backdrop-blur shadow-lg rounded-xl p-3 border border-slate-200 min-w-[140px]">
                  <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-0.5">所在座標 (X, Y)</span>
                  <span className="text-xl font-black text-emerald-600 font-mono">({currentCoords.x}, {currentCoords.y})</span>
                </div>
              </div>

              {/* 互動式畫布 */}
              <canvas 
                ref={canvasRef} 
                width={2000} // 給予夠大的內部解析度
                height={1500} 
                onMouseDown={handleMouseDown}
                onMouseMove={handleMouseMove}
                onMouseUp={handleMouseUpOrLeave}
                onMouseLeave={handleMouseUpOrLeave}
                className="absolute inset-0 w-full h-full cursor-grab active:cursor-grabbing"
              />
            </div>
          </main>
        </div>
      );
    };

    // 將 React 元件渲染到畫面上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
