<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蒙提霍爾大挑戰</title>
  
  <!-- 引入 Tailwind CSS (負責畫面排版與顏色) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM (負責互動邏輯) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel (負責讓瀏覽器看懂 JSX 語法) -->
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- 遊戲會渲染在這個 div 裡面 -->
  <div id="root"></div>

  <!-- 主要程式碼區塊 (type="text/babel" 告訴瀏覽器要翻譯這段程式碼) -->
  <script type="text/babel">
    // 從 React 提取需要的工具 (取代原本的 import)
    const { useState, useEffect } = React;

    const MontyHallGame = () => {
      // 遊戲規則設定 (總數上限改為100)
      const [config, setConfig] = useState({ total: 3, open: 1 });
      
      // 用於輸入框暫存的狀態
      const [inputConfig, setInputConfig] = useState({ total: '3', open: '1' });
      
      // 遊戲狀態：'start', 'opened', 'end'
      const [gameState, setGameState] = useState('start');
      const [doors, setDoors] = useState([]);
      const [selectedDoor, setSelectedDoor] = useState(null);
      const [openedDoors, setOpenedDoors] = useState([]);
      const [resultMessage, setResultMessage] = useState('');
      
      // 統計數據
      const [stats, setStats] = useState({
        stay: { played: 0, won: 0 },
        switch: { played: 0, won: 0 }
      });

      // 自動模擬設定
      const [simulateCount, setSimulateCount] = useState('100');
      const [simStrategy, setSimStrategy] = useState('both');
      const [isSimulating, setIsSimulating] = useState(false);

      // 初始化遊戲
      const initGame = () => {
        const { total } = config;
        const winIndex = Math.floor(Math.random() * total);
        
        const newDoors = Array.from({ length: total }, (_, i) => ({
          id: i,
          content: i === winIndex ? 'car' : 'goat',
          isOpen: false,
          isSelected: false
        }));
        
        setDoors(newDoors);
        setGameState('start');
        setSelectedDoor(null);
        setOpenedDoors([]);
        setResultMessage('');
      };

      useEffect(() => {
        initGame();
        resetStats();
      }, [config]);

      // 同步正式規則回輸入框
      useEffect(() => {
        setInputConfig({ total: config.total.toString(), open: config.open.toString() });
      }, [config]);

      const handleInputChange = (type, value) => {
        setInputConfig(prev => ({ ...prev, [type]: value }));
      };

      // 處理輸入驗證 (包含範圍與不等式限制)
      const applyConfig = () => {
        let t = parseInt(inputConfig.total);
        let o = parseInt(inputConfig.open);

        // 驗證並修正總門數 (限制 3~100)
        if (isNaN(t) || t < 3) t = 3;
        if (t > 100) t = 100;

        // 驗證並修正開門數 (不等式限制: 1 <= 開門數 <= 總數 - 2)
        if (isNaN(o) || o < 1) o = 1;
        if (o > t - 2) o = t - 2;

        // 將修正後的值寫回 UI，確保使用者看到的是系統最終採用的合法數字
        setInputConfig({ total: t.toString(), open: o.toString() });
        setConfig({ total: t, open: o });
      };

      // 處理玩家點擊門
      const handleDoorClick = (doorId) => {
        if (gameState === 'start') {
          setSelectedDoor(doorId);
          
          const { total, open } = config;
          const winDoorId = doors.find(d => d.content === 'car').id;
          
          let availableToOpen = doors.filter(d => d.id !== doorId && d.id !== winDoorId);
          let toOpenIds = [];
          for(let i=0; i<open; i++) {
            if(availableToOpen.length === 0) break;
            const randIdx = Math.floor(Math.random() * availableToOpen.length);
            toOpenIds.push(availableToOpen[randIdx].id);
            availableToOpen.splice(randIdx, 1);
          }
          
          setOpenedDoors(toOpenIds);
          setDoors(prev => prev.map(d => ({
            ...d,
            isOpen: toOpenIds.includes(d.id),
            isSelected: d.id === doorId
          })));
          
          setGameState('opened');
          
        } else if (gameState === 'opened') {
          const targetDoor = doors.find(d => d.id === doorId);
          if (targetDoor.isOpen) return;

          const willSwitch = doorId !== selectedDoor;

          setDoors(prev => prev.map(d => ({
              ...d,
              isSelected: d.id === doorId,
              isOpen: true
          })));

          const isWin = targetDoor.content === 'car';
          if (isWin) {
            setResultMessage('🎉 恭喜！開出跑車啦！🚗');
          } else {
            setResultMessage('💥 噗！是一隻山羊！🐐');
          }

          updateStats(willSwitch ? 'switch' : 'stay', isWin);
          setGameState('end');
        }
      };

      const updateStats = (strategy, isWin) => {
        setStats(prev => ({
          ...prev,
          [strategy]: { played: prev[strategy].played + 1, won: prev[strategy].won + (isWin ? 1 : 0) }
        }));
      };

      const resetStats = () => {
        setStats({ stay: { played: 0, won: 0 }, switch: { played: 0, won: 0 } });
      };

      const handleSimulateCountChange = (e) => {
        let val = e.target.value.replace(/[^0-9]/g, ''); // 只允許輸入數字
        if (val.length > 1 && val.startsWith('0')) {
          val = val.replace(/^0+/, '');
        }
        setSimulateCount(val);
      };

      const runSimulation = () => {
        const count = parseInt(simulateCount) || 1;
        if (count <= 0 || isSimulating) return;
        
        setIsSimulating(true);
        let currentStats = {
          stay: { ...stats.stay },
          switch: { ...stats.switch }
        };
        const { total, open } = config;
        
        setTimeout(() => {
          for (let i = 0; i < count; i++) {
            let winIndex = Math.floor(Math.random() * total);
            let initialChoice = Math.floor(Math.random() * total);
            
            if (simStrategy === 'stay' || simStrategy === 'both') {
              let isWinStay = (winIndex === initialChoice);
              currentStats.stay.played += 1;
              currentStats.stay.won += isWinStay ? 1 : 0;
            }

            if (simStrategy === 'switch' || simStrategy === 'both') {
              let isWinSwitch = false;
              if (initialChoice !== winIndex) {
                const remainingSwitchable = total - 1 - open;
                if (Math.floor(Math.random() * remainingSwitchable) === 0) {
                  isWinSwitch = true;
                }
              }
              currentStats.switch.played += 1;
              currentStats.switch.won += isWinSwitch ? 1 : 0;
            }
          }
          setStats(currentStats);
          setIsSimulating(false);
        }, 100);
      };

      const getWinRate = (strategyStats) => {
        if (strategyStats.played === 0) return '0.0';
        return ((strategyStats.won / strategyStats.played) * 100).toFixed(1);
      };

      const theoStayRate = (1 / config.total) * 100;
      const theoSwitchRate = config.total === 3 && config.open === 1 
        ? 66.67 
        : ((config.total - 1) / config.total) * (1 / (config.total - 1 - config.open)) * 100;

      return (
        <div className="min-h-screen bg-yellow-200 text-slate-900 p-4 md:p-8 font-black tracking-wide selection:bg-pink-300">
          <div className="max-w-6xl mx-auto space-y-8">
            
            <header className="text-center space-y-4">
              <div className="inline-block bg-white border-4 border-black rounded-3xl p-4 md:p-6 shadow-[8px_8px_0_0_rgba(0,0,0,1)] transform -rotate-1">
                <h1 className="text-3xl md:text-5xl font-black text-black drop-shadow-[2px_2px_0_#fff]">
                  🚪 蒙提霍爾 <span className="text-pink-500">大挑戰!</span> 🐐
                </h1>
              </div>
              <p className="bg-black text-white p-3 rounded-xl border-4 border-black max-w-3xl mx-auto text-sm md:text-base shadow-[6px_6px_0_0_#f472b6] transform rotate-1">
                規則：選一扇門 👉 主持人開山羊門 👉 決定要不要換門！<br/>
                (最高支援 100 扇門，來試試大數法則的威力吧！)
              </p>
            </header>

            <div className="grid lg:grid-cols-3 gap-8">
              
              <div className="lg:col-span-2 bg-blue-100 p-4 md:p-6 rounded-[32px] border-4 border-black shadow-[12px_12px_0_0_rgba(0,0,0,1)] flex flex-col items-center">
                
                <div className="min-h-[5rem] flex items-center justify-center w-full mb-6 bg-white border-4 border-black rounded-2xl p-4 shadow-[4px_4px_0_0_#000] relative">
                  <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 w-4 h-4 bg-white border-r-4 border-b-4 border-black transform rotate-45"></div>
                  {gameState === 'start' && (
                    <p className="text-xl md:text-2xl text-blue-600 animate-pulse">👉 請點擊選擇一扇門！</p>
                  )}
                  {gameState === 'opened' && (
                    <div className="text-center">
                      <p className="text-base md:text-lg text-slate-700">
                        主持人打開了 <span className="text-red-500 text-xl">{config.open}</span> 扇山羊門...
                      </p>
                      <p className="text-xl md:text-2xl font-black text-pink-600 mt-1">
                        💥 你要改變選擇嗎？點擊做最後決定！
                      </p>
                    </div>
                  )}
                  {gameState === 'end' && (
                    <p className={`text-2xl md:text-3xl ${resultMessage.includes('恭喜') ? 'text-green-600' : 'text-red-600'}`}>
                      {resultMessage}
                    </p>
                  )}
                </div>

                <div className="w-full max-h-[55vh] overflow-y-auto p-4 md:p-6 bg-blue-50 border-4 border-black rounded-3xl shadow-inner">
                  <div 
                    className="grid gap-3 md:gap-4 justify-center items-end w-full"
                    style={{ 
                      gridTemplateColumns: `repeat(auto-fit, minmax(${config.total > 50 ? '45px' : config.total > 20 ? '60px' : '90px'}, 1fr))` 
                    }}
                  >
                    {doors.map((door) => (
                      <div 
                        key={door.id}
                        onClick={() => handleDoorClick(door.id)}
                        className={`
                          relative aspect-[1/1.6] w-full max-w-[100px] mx-auto transition-all duration-200 flex flex-col items-center justify-center cursor-pointer 
                          border-4 border-black rounded-t-full rounded-b-xl
                          ${door.isOpen 
                            ? 'bg-slate-300 opacity-60 shadow-none translate-y-2' 
                            : 'bg-green-400 shadow-[4px_6px_0_0_#000] hover:-translate-y-2 hover:shadow-[4px_10px_0_0_#000] active:translate-y-1 active:shadow-[4px_2px_0_0_#000]'
                          }
                          ${door.isSelected && gameState !== 'end' ? 'bg-pink-400 ring-4 ring-pink-600 ring-offset-4 ring-offset-blue-50' : ''}
                          ${gameState === 'opened' && !door.isOpen && !door.isSelected ? 'animate-bounce-slight bg-yellow-400' : ''}
                        `}
                      >
                        {!door.isOpen && (
                          <div className="absolute top-1/2 w-3 h-3 bg-black rounded-full right-2 shadow-[inset_-1px_-1px_0_#fff]"></div>
                        )}
                        
                        {!door.isOpen ? (
                           <div className={`${config.total > 50 ? 'text-lg' : 'text-3xl'} text-black opacity-50`}>{door.id + 1}</div>
                        ) : (
                           door.content === 'car' 
                             ? <div className={`${config.total > 50 ? 'text-2xl' : 'text-5xl'} drop-shadow-md`}>🚗</div> 
                             : <div className={`${config.total > 50 ? 'text-2xl' : 'text-5xl'} opacity-80`}>🐐</div>
                        )}

                        {door.isSelected && gameState !== 'end' && (
                          <div className="absolute -bottom-6 md:-bottom-8 text-white bg-black border-2 border-black text-xs px-2 py-1 rounded-md whitespace-nowrap shadow-[2px_2px_0_0_#f472b6] z-10">
                            你選的
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>

                <div className="h-16 flex items-center mt-8">
                  {gameState === 'end' && (
                    <button 
                      onClick={initGame}
                      className="px-8 py-3 bg-green-400 hover:bg-green-300 text-black border-4 border-black text-xl md:text-2xl rounded-full shadow-[6px_6px_0_0_#000] active:translate-y-2 active:shadow-none transition-all"
                    >
                      🔄 再玩一次！
                    </button>
                  )}
                </div>
              </div>

              <div className="space-y-6">
                
                <div className="bg-white p-6 rounded-[24px] border-4 border-black shadow-[8px_8px_0_0_#000]">
                  <h2 className="text-2xl font-black mb-4 text-purple-600 flex items-center gap-2">
                    ⚙️ 設定規則
                  </h2>
                  <div className="space-y-4">
                    <div className="flex justify-between items-center bg-purple-50 p-3 border-2 border-black rounded-xl">
                      <div className="flex flex-col">
                        <label className="text-black text-sm">總門數</label>
                        <span className="text-[10px] text-gray-500 font-bold">限制: 3 ~ 100</span>
                      </div>
                      <input 
                        type="number" 
                        min="3" max="100"
                        value={inputConfig.total}
                        onChange={(e) => handleInputChange('total', e.target.value)}
                        onBlur={applyConfig}
                        onKeyDown={(e) => e.key === 'Enter' && applyConfig()}
                        className="w-24 bg-white border-4 border-black rounded-lg px-2 py-2 text-center text-xl text-black focus:outline-none focus:bg-purple-100 shadow-inner"
                      />
                    </div>
                    
                    <div className="flex justify-between items-center bg-orange-50 p-3 border-2 border-black rounded-xl">
                      <div className="flex flex-col">
                        <label className="text-black text-sm">主持人開幾扇</label>
                        <span className="text-[10px] text-gray-500 font-bold">限制: 1 ~ 總數-2</span>
                      </div>
                      <input 
                        type="number" 
                        min="1"
                        value={inputConfig.open}
                        onChange={(e) => handleInputChange('open', e.target.value)}
                        onBlur={applyConfig}
                        onKeyDown={(e) => e.key === 'Enter' && applyConfig()}
                        className="w-24 bg-white border-4 border-black rounded-lg px-2 py-2 text-center text-xl text-black focus:outline-none focus:bg-orange-100 shadow-inner"
                      />
                    </div>
                  </div>
                </div>

                <div className="bg-white p-6 rounded-[24px] border-4 border-black shadow-[8px_8px_0_0_#000]">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-2xl font-black text-blue-600">📊 戰績表</h2>
                    <button onClick={resetStats} className="text-sm px-3 py-1 bg-gray-200 border-2 border-black text-black rounded-lg shadow-[2px_2px_0_0_#000] active:translate-y-1 active:shadow-none transition-all">清空</button>
                  </div>
                  
                  <div className="space-y-6">
                    <div className="bg-blue-50 p-4 border-4 border-black rounded-xl shadow-[4px_4px_0_0_#000]">
                      <div className="flex justify-between items-end mb-2 text-black font-bold">
                        <div className="flex flex-col">
                          <span className="text-lg">堅持不換</span>
                          <span className="text-sm text-gray-700 font-medium">({stats.stay.played}戰 {stats.stay.won}勝)</span>
                        </div>
                        <div className="flex flex-col items-end">
                          <span className="text-blue-600 text-2xl font-black">實際: {getWinRate(stats.stay)}%</span>
                          <span className="text-xs text-black bg-yellow-200 px-1 border border-black rounded">理論機率: {theoStayRate.toFixed(1)}%</span>
                        </div>
                      </div>
                      <div className="w-full bg-white border-4 border-black rounded-full h-6 relative overflow-hidden">
                        <div className="bg-blue-400 h-full transition-all duration-500" style={{ width: `${getWinRate(stats.stay)}%` }}></div>
                        <div className="absolute top-0 bottom-0 w-2 bg-black z-10" style={{ left: `calc(${theoStayRate}% - 4px)` }} title={`理論值: ${theoStayRate.toFixed(1)}%`}></div>
                      </div>
                    </div>

                    <div className="bg-pink-50 p-4 border-4 border-black rounded-xl shadow-[4px_4px_0_0_#000]">
                      <div className="flex justify-between items-end mb-2 text-black font-bold">
                        <div className="flex flex-col">
                          <span className="text-lg">改變選擇</span>
                          <span className="text-sm text-gray-700 font-medium">({stats.switch.played}戰 {stats.switch.won}勝)</span>
                        </div>
                        <div className="flex flex-col items-end">
                          <span className="text-pink-600 text-2xl font-black">實際: {getWinRate(stats.switch)}%</span>
                          <span className="text-xs text-black bg-yellow-200 px-1 border border-black rounded">理論機率: {theoSwitchRate.toFixed(1)}%</span>
                        </div>
                      </div>
                      <div className="w-full bg-white border-4 border-black rounded-full h-6 relative overflow-hidden">
                        <div className="bg-pink-400 h-full transition-all duration-500" style={{ width: `${getWinRate(stats.switch)}%` }}></div>
                        <div className="absolute top-0 bottom-0 w-2 bg-black z-10" style={{ left: `calc(${theoSwitchRate}% - 4px)` }} title={`理論值: ${theoSwitchRate.toFixed(1)}%`}></div>
                      </div>
                    </div>

                    <div className="flex justify-end">
                      <span className="text-xs text-black font-bold flex items-center gap-1">
                        <span className="w-2 h-4 bg-black inline-block"></span> 理論值黑線
                      </span>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-6 rounded-[24px] border-4 border-black shadow-[8px_8px_0_0_#000]">
                  <h2 className="text-xl font-black mb-4 text-green-600">⚡ 快速模擬器</h2>
                  
                  <div className="space-y-4">
                    <div className="grid grid-cols-3 gap-2">
                      <button 
                        onClick={() => setSimStrategy('stay')}
                        className={`border-4 border-black rounded-lg py-2 text-sm transition-all ${simStrategy === 'stay' ? 'bg-blue-400 text-white shadow-inner translate-y-1' : 'bg-white shadow-[2px_2px_0_0_#000] hover:-translate-y-1'}`}
                      >只跑不換</button>
                      <button 
                        onClick={() => setSimStrategy('switch')}
                        className={`border-4 border-black rounded-lg py-2 text-sm transition-all ${simStrategy === 'switch' ? 'bg-pink-400 text-white shadow-inner translate-y-1' : 'bg-white shadow-[2px_2px_0_0_#000] hover:-translate-y-1'}`}
                      >只跑換門</button>
                      <button 
                        onClick={() => setSimStrategy('both')}
                        className={`border-4 border-black rounded-lg py-2 text-sm transition-all ${simStrategy === 'both' ? 'bg-purple-400 text-white shadow-inner translate-y-1' : 'bg-white shadow-[2px_2px_0_0_#000] hover:-translate-y-1'}`}
                      >同時對照</button>
                    </div>

                    <div className="flex gap-2">
                      <div className="flex-1 flex flex-col">
                        <label className="text-xs text-black mb-1">次數</label>
                        <input 
                          type="text" 
                          value={simulateCount}
                          onChange={handleSimulateCountChange}
                          className="w-full bg-white border-4 border-black rounded-xl px-2 py-2 text-black focus:outline-none focus:bg-green-50 shadow-inner font-mono text-center"
                        />
                      </div>
                      <button 
                        onClick={runSimulation}
                        disabled={isSimulating}
                        className="flex-[2] self-end py-2 px-4 bg-green-400 disabled:bg-gray-300 text-black border-4 border-black rounded-xl shadow-[4px_4px_0_0_#000] active:translate-y-1 active:shadow-none transition-all h-[44px]"
                      >
                        {isSimulating ? '模擬中...' : '🚀 開始跑！'}
                      </button>
                    </div>
                  </div>
                </div>

              </div>
            </div>
            
            <style dangerouslySetInnerHTML={{__html: `
              @keyframes bounce-slight {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-4px); }
              }
              .animate-bounce-slight {
                animation: bounce-slight 1.5s infinite ease-in-out;
              }
            `}} />
          </div>
        </div>
      );
    };

    // 將 React 元件掛載到 HTML 內的 root 節點
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MontyHallGame />);
  </script>
</body>
</html>
