<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>費馬點探究：從實驗到證明</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 進行即時編譯 -->
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入 Lucide 圖示庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- 補充原專案依賴的自訂動畫效果 -->
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { transform: translateX(-1rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(1rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInBottom { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .animate-in.fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .slide-in-from-left-2 { animation: slideInLeft 0.4s ease-out forwards; }
    .slide-in-from-right-4 { animation: slideInRight 0.4s ease-out forwards; }
    .slide-in-from-bottom-2 { animation: slideInBottom 0.4s ease-out forwards; }
    .zoom-in { animation: zoomIn 0.4s ease-out forwards; }
    
    /* 避免觸控設備上不必要的捲動與選取 */
    .touch-none { touch-action: none; }
  </style>
</head>
<body class="bg-slate-200 min-h-screen flex items-center justify-center py-8">
  <div id="root" class="w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ==========================================
    // Lucide Icon 橋接器
    // ==========================================
    const createIcon = (iconName) => ({ size = 24, className = "" }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide && window.lucide.icons[iconName]) {
          ref.current.innerHTML = '';
          const svg = window.lucide.createElement(window.lucide.icons[iconName]);
          svg.setAttribute('width', size);
          svg.setAttribute('height', size);
          if (className) svg.setAttribute('class', className);
          ref.current.appendChild(svg);
        }
      }, [size, className]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
    };

    // 初始化所有用到的圖示
    const CheckCircle = createIcon('CheckCircle');
    const ArrowRight = createIcon('ArrowRight');
    const ArrowLeft = createIcon('ArrowLeft');
    const RotateCcw = createIcon('RotateCcw');
    const MousePointer2 = createIcon('MousePointer2');
    const Ruler = createIcon('Ruler');
    const Star = createIcon('Star');
    const RefreshCw = createIcon('RefreshCw');
    const ZoomIn = createIcon('ZoomIn');
    const ZoomOut = createIcon('ZoomOut');
    const Move = createIcon('Move');
    const PenTool = createIcon('PenTool');
    const ClipboardList = createIcon('ClipboardList');
    const Plus = createIcon('Plus');
    const Search = createIcon('Search');
    const Trash2 = createIcon('Trash2');
    const Info = createIcon('Info');
    const Eye = createIcon('Eye');
    const EyeOff = createIcon('EyeOff');
    const HelpCircle = createIcon('HelpCircle');
    const AlertTriangle = createIcon('AlertTriangle');

    // ==========================================
    // 純數學輔助函式
    // ==========================================
    const dist = (p1, p2) => Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
    const toRad = (deg) => deg * Math.PI / 180;

    const rotatePointByAngle = (p, center, angleRad) => {
      const dx = p.x - center.x;
      const dy = p.y - center.y;
      return {
        x: center.x + dx * Math.cos(angleRad) - dy * Math.sin(angleRad),
        y: center.y + dx * Math.sin(angleRad) + dy * Math.cos(angleRad)
      };
    };

    const rotatePoint = (p, center, angleDeg) => {
      return rotatePointByAngle(p, center, toRad(angleDeg));
    };

    const getAngle = (p1, center, p2) => {
      const a = dist(center, p2);
      const b = dist(center, p1);
      const c = dist(p1, p2);
      if(a === 0 || b === 0) return 0;
      const val = (a*a + b*b - c*c) / (2*a*b);
      return Math.acos(Math.max(-1, Math.min(1, val))) * 180 / Math.PI;
    };

    const getExtVertex = (p1, p2, other) => {
       const mid = {x: (p1.x+p2.x)/2, y: (p1.y+p2.y)/2};
       const v = {x: p2.x-p1.x, y: p2.y-p1.y};
       const len = Math.sqrt(v.x**2+v.y**2);
       let n = {x: -v.y, y: v.x}; 
       const toOther = {x: other.x-mid.x, y: other.y-mid.y};
       if(n.x*toOther.x + n.y*toOther.y > 0) { n.x = -n.x; n.y = -n.y; }
       const h = len * Math.sqrt(3)/2;
       return {x: mid.x + n.x/len*h, y: mid.y + n.y/len*h};
    };

    const getLineIntersection = (p1, p2, p3, p4) => {
        const d = (p1.x-p2.x)*(p3.y-p4.y) - (p1.y-p2.y)*(p3.x-p4.x);
        if(d===0) return null;
        const t = ((p1.x-p3.x)*(p3.y-p4.y) - (p1.y-p3.y)*(p3.x-p4.x))/d;
        return {x: p1.x + t*(p2.x-p1.x), y: p1.y + t*(p2.y-p1.y)};
    };

    // ==========================================
    // 核心元件
    // ==========================================
    const FermatGuidedTour = () => {
      // --- 狀態管理 ---
      const canvasRef = useRef(null);
      const containerRef = useRef(null); 
      const [size, setSize] = useState({ width: 800, height: 600 });
      const [step, setStep] = useState(1); 
      const [maxStepReached, setMaxStepReached] = useState(1); 

      // 視圖控制
      const [scale, setScale] = useState(1);
      const [offset, setOffset] = useState({ x: 0, y: 0 });
      const [isPanning, setIsPanning] = useState(false);
      const [lastPanPoint, setLastPanPoint] = useState({ x: 0, y: 0 });

      // 幾何資料
      const defaultVertices = {
        A: { x: 400, y: 150 }, 
        B: { x: 300, y: 400 },
        C: { x: 600, y: 400 },
      };
      const [vertices, setVertices] = useState(defaultVertices);
      const [pPoint, setPPoint] = useState({ x: 450, y: 300 });
      
      // Step 5 專用：角 A 度數控制
      const [angleAValue, setAngleAValue] = useState(130);

      // 互動狀態
      const [isDragging, setIsDragging] = useState(null);

      // 實驗數據記錄
      const [dataRecords, setDataRecords] = useState([]); 
      const [hasFoundOptimal, setHasFoundOptimal] = useState(false); 
      const [recordWarning, setRecordWarning] = useState('');

      // 後續步驟控制
      const [rotationAngle, setRotationAngle] = useState(0); 
      const [pivot, setPivot] = useState('C'); 
      
      // Step 4 & 5 控制
      const [constructionStep, setConstructionStep] = useState(0);
      const [showObtuseProof, setShowObtuseProof] = useState(false); 

      // --- 核心計算 ---
      const constructionPoints = useMemo(() => {
          const { A, B, C } = vertices;
          return {
              C_prime: getExtVertex(B, C, A), 
              A_prime: getExtVertex(A, C, B), 
              B_prime: getExtVertex(A, B, C), 
          };
      }, [vertices]);

      const isogonicCenter = useMemo(() => {
          const { A, B } = vertices;
          const { A_prime, B_prime } = constructionPoints;
          return getLineIntersection(A, constructionPoints.C_prime, B, A_prime); 
      }, [vertices, constructionPoints]);

      const exactFermat = useMemo(() => {
        const { A, B, C } = vertices;
        const angA = getAngle(B, A, C);
        const angB = getAngle(A, B, C);
        const angC = getAngle(A, C, B);
        
        if (angA >= 120) return { ...A, isVertex: true };
        if (angB >= 120) return { ...B, isVertex: true };
        if (angC >= 120) return { ...C, isVertex: true };

        if (isogonicCenter) return { ...isogonicCenter, isVertex: false };
        return { x: (A.x+B.x+C.x)/3, y: (A.y+B.y+C.y)/3, isVertex: false }; 
      }, [vertices, isogonicCenter]);

      const currentSum = dist(pPoint, vertices.A) + dist(pPoint, vertices.B) + dist(pPoint, vertices.C);
      const minSum = useMemo(() => 
        dist(exactFermat, vertices.A) + dist(exactFermat, vertices.B) + dist(exactFermat, vertices.C)
      , [exactFermat, vertices]);
      
      const diff = currentSum - minSum;
      const isOptimal = diff < 2; 

      const targetGood = 3;
      const targetPoor = 3;
      const goodCount = dataRecords.filter(r => r.isOptimal).length;
      const poorCount = dataRecords.filter(r => r.diff > 10).length;
      const canProceedStep1 = goodCount >= targetGood && poorCount >= targetPoor;

      useEffect(() => {
        if (step === 1 && isOptimal) {
            setHasFoundOptimal(true);
            if (canProceedStep1 && maxStepReached < 2) {
                setMaxStepReached(2);
            }
        }
      }, [step, isOptimal, canProceedStep1, maxStepReached]);

      useEffect(() => {
        const updateSize = () => {
          if (containerRef.current) {
            const { offsetWidth, offsetHeight } = containerRef.current;
            if (offsetWidth > 0 && offsetHeight > 0) {
                setSize({ width: offsetWidth, height: offsetHeight });
            }
          }
        };
        updateSize();
        window.addEventListener('resize', updateSize);
        return () => window.removeEventListener('resize', updateSize);
      }, []);

      const handleReset = () => {
          const cx = size.width / 2;
          const cy = size.height / 2;
          
          if (step === 5) {
              updateObtuseTriangle(130, cx, cy);
              setAngleAValue(130);
              setShowObtuseProof(false);
          } else {
              setVertices({
                  A: { x: cx, y: cy - 150 },
                  B: { x: cx - 100, y: cy + 100 },
                  C: { x: cx + 150, y: cy + 100 },
              });
              setPPoint({x: cx + 20, y: cy + 20});
              setStep(1); 
              setMaxStepReached(1);
              setDataRecords([]);
              setHasFoundOptimal(false);
          }
          
          setIsDragging(null); 
          setRotationAngle(0); 
          setPivot('C');
          setScale(1);
          setOffset({x:0, y:0});
          setConstructionStep(0);
          setRecordWarning('');
      };

      const updateObtuseTriangle = (angleDeg, cx, cy) => {
          const baseWidth = 360; 
          const B = { x: cx - baseWidth/2, y: cy + 100 };
          const C = { x: cx + baseWidth/2, y: cy + 100 };
          
          const halfBase = baseWidth / 2;
          const angleRad = toRad(angleDeg);
          const height = halfBase / Math.tan(angleRad / 2);
          
          const A = { x: cx, y: B.y - height };
          
          setVertices({ A, B, C });
          setPPoint({ x: A.x, y: A.y + 40 });
      };

      useEffect(() => {
          if (step === 5) {
              const cx = size.width / 2;
              const cy = size.height / 2;
              updateObtuseTriangle(130, cx, cy);
              setAngleAValue(130);
              setShowObtuseProof(false);
          }
      }, [step, size]); 

      const handleAngleChange = (e) => {
          const deg = parseInt(e.target.value);
          setAngleAValue(deg);
          const cx = size.width / 2;
          const cy = size.height / 2;
          updateObtuseTriangle(deg, cx, cy);
      };

      const recordData = () => {
          setRecordWarning('');
          if (dataRecords.length > 0) {
              const lastRecord = dataRecords[0];
              if (dist(pPoint, lastRecord.p) < 5) {
                  setRecordWarning('請移動 P 點後再記錄');
                  return;
              }
          }
          const angAPB = getAngle(vertices.A, pPoint, vertices.B);
          const angBPC = getAngle(vertices.B, pPoint, vertices.C);
          const angCPA = getAngle(vertices.C, pPoint, vertices.A);
          
          const newRecord = {
              id: Date.now(),
              p: { ...pPoint }, 
              sum: currentSum,
              diff: currentSum - minSum,
              angles: [angAPB, angBPC, angCPA],
              isOptimal: isOptimal
          };
          
          const newDataRecords = [newRecord, ...dataRecords];
          setDataRecords(newDataRecords);
          if (newRecord.isOptimal) {
              setHasFoundOptimal(true);
          }
      };

      const screenToWorld = (sx, sy) => {
        return {
            x: (sx - offset.x) / scale,
            y: (sy - offset.y) / scale
        };
      };

      // --- 繪圖邏輯 ---
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        canvas.width = size.width;
        canvas.height = size.height;

        ctx.clearRect(0, 0, size.width, size.height);
        
        ctx.save();
        ctx.translate(offset.x, offset.y);
        ctx.scale(scale, scale);

        const drawLine = (p1, p2, color='#94a3b8', width=1, dash=[]) => {
          ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = color; ctx.lineWidth = width; ctx.setLineDash(dash); ctx.stroke(); ctx.setLineDash([]);
        };
        const drawDot = (p, color, r=5) => {
          ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
        };
        const drawText = (txt, p, offset={x:0,y:0}, color='#334155', font='14px sans-serif') => {
          ctx.fillStyle = color; ctx.font = font; ctx.fillText(txt, p.x+offset.x, p.y+offset.y);
        };

        const { A, B, C } = vertices;
        const { A_prime, B_prime, C_prime } = constructionPoints; 

        const isRotating = step === 2 || step === 3;
        
        if (!isRotating) {
            drawLine(A, B, '#334155', 2);
            drawLine(B, C, '#334155', 2);
            drawLine(C, A, '#334155', 2);
        } else {
            if (pivot === 'C') { drawLine(B, C, '#334155', 2); drawLine(A, C, '#94a3b8', 1, [5,5]); drawLine(A, B, '#cbd5e1', 1); }
            else if (pivot === 'B') { drawLine(A, B, '#334155', 2); drawLine(B, C, '#94a3b8', 1, [5,5]); drawLine(A, C, '#cbd5e1', 1); }
            else { drawLine(A, C, '#334155', 2); drawLine(A, B, '#94a3b8', 1, [5,5]); drawLine(B, C, '#cbd5e1', 1); }
        }

        drawDot(A, '#ef4444'); drawText('A', A, {x:-10,y:-10});
        drawDot(B, '#10b981'); drawText('B', B, {x:-20,y:20});
        drawDot(C, '#f59e0b'); drawText('C', C, {x:10,y:20});

        // Step 1
        if (step === 1) {
            drawLine(pPoint, A, '#3b82f6', 1.5);
            drawLine(pPoint, B, '#3b82f6', 1.5);
            drawLine(pPoint, C, '#3b82f6', 1.5);
            
            const pColor = isOptimal ? '#059669' : '#2563eb';
            drawDot(pPoint, pColor, 6);
            drawText('P', pPoint, {x:10,y:0}, pColor);
        }

        // Step 2 & 3
        if (step === 2 || step === 3) {
            const rotDeg = step === 3 ? 60 : rotationAngle; 
            let center, movingPt1, movingPt2, fixedPt1, targetLabel;
            
            if (pivot === 'C') { center = C; movingPt1 = A; movingPt2 = pPoint; fixedPt1 = B; targetLabel = "A'"; } 
            else if (pivot === 'B') { center = B; movingPt1 = C; movingPt2 = pPoint; fixedPt1 = A; targetLabel = "C'"; } 
            else { center = A; movingPt1 = B; movingPt2 = pPoint; fixedPt1 = C; targetLabel = "B'"; } 

            const rotPt1 = rotatePoint(movingPt1, center, rotDeg);
            const rotPt2 = rotatePoint(movingPt2, center, rotDeg);

            ctx.beginPath(); ctx.moveTo(center.x, center.y); ctx.lineTo(movingPt1.x, movingPt1.y); ctx.lineTo(movingPt2.x, movingPt2.y);
            ctx.fillStyle = 'rgba(59, 130, 246, 0.05)'; ctx.fill(); 
            ctx.beginPath(); ctx.moveTo(center.x, center.y); ctx.lineTo(rotPt1.x, rotPt1.y); ctx.lineTo(rotPt2.x, rotPt2.y);
            ctx.fillStyle = 'rgba(249, 115, 22, 0.1)'; ctx.fill(); 

            drawDot(pPoint, '#2563eb', 5); drawText('P', pPoint, {x:-10,y:-5}, '#2563eb');
            drawDot(rotPt2, '#2563eb', 4); drawText(step===3||rotDeg===60?"P'":"", rotPt2, {x:10,y:10}, '#2563eb');
            drawDot(rotPt1, '#ea580c'); drawText(step===3||rotDeg===60?targetLabel:"", rotPt1, {x:10,y:-10}, '#ea580c');

            const startNode = fixedPt1; 
            ctx.beginPath(); ctx.moveTo(startNode.x, startNode.y); ctx.lineTo(pPoint.x, pPoint.y);
            ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 3; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(pPoint.x, pPoint.y); ctx.lineTo(rotPt2.x, rotPt2.y);
            ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 3; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(rotPt2.x, rotPt2.y); ctx.lineTo(rotPt1.x, rotPt1.y);
            ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 3; ctx.stroke();
            
            if (rotDeg === 60) {
                drawLine(center, rotPt1, '#ea580c', 1, [2,2]); 
            }
        }

        // Step 4
        if (step === 4) {
            const drawPoly = (pts, color) => { ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); pts.forEach(p=>ctx.lineTo(p.x, p.y)); ctx.closePath(); ctx.fillStyle=color; ctx.fill(); ctx.strokeStyle=color.replace('0.1','1'); ctx.setLineDash([2,2]); ctx.lineWidth=1; ctx.stroke(); ctx.setLineDash([]); };
            
            const drawRotationTrace = (center, start, end) => {
                const angleStart = Math.atan2(start.y - center.y, start.x - center.x);
                const angleEnd = Math.atan2(end.y - center.y, end.x - center.x);
                ctx.beginPath();
                ctx.arc(center.x, center.y, dist(center, start), angleStart, angleEnd, Math.abs(angleStart - angleEnd) > Math.PI ? angleStart < angleEnd : angleStart > angleEnd); 
                ctx.strokeStyle = '#3b82f6'; ctx.setLineDash([4,4]); ctx.lineWidth = 1; ctx.stroke(); ctx.setLineDash([]);
            };

            const drawRotatedTriangle = (origin, center, targetEqVertex) => {
                const angleRad = Math.atan2(targetEqVertex.y - center.y, targetEqVertex.x - center.x) - Math.atan2(origin.y - center.y, origin.x - center.x);
                const pRot = rotatePointByAngle(exactFermat, center, angleRad);
                const originRot = targetEqVertex; 
                
                ctx.beginPath(); ctx.moveTo(exactFermat.x, exactFermat.y); ctx.lineTo(center.x, center.y); ctx.lineTo(origin.x, origin.y); ctx.closePath();
                ctx.fillStyle = 'rgba(59, 130, 246, 0.1)'; ctx.fill(); 
                
                ctx.beginPath(); ctx.moveTo(pRot.x, pRot.y); ctx.lineTo(center.x, center.y); ctx.lineTo(originRot.x, originRot.y); ctx.closePath();
                ctx.fillStyle = 'rgba(249, 115, 22, 0.2)'; ctx.fill(); 
                
                drawRotationTrace(center, exactFermat, pRot);
                drawDot(pRot, '#ea580c', 3);
            };

            if (constructionStep >= 1) {
                drawPoly([B, C, C_prime], 'rgba(16, 185, 129, 0.1)'); 
                drawDot(C_prime, '#059669', 3); drawText("C'", C_prime, {x:5,y:5}, '#059669');
                drawLine(A, C_prime, '#ef4444', 1.5); 
                if (exactFermat.isVertex === false) drawRotatedTriangle(C, B, C_prime);
            }
            
            if (constructionStep >= 2) {
                drawPoly([A, C, A_prime], 'rgba(16, 185, 129, 0.1)'); 
                drawDot(A_prime, '#059669', 3); drawText("A'", A_prime, {x:5,y:5}, '#059669');
                drawLine(B, A_prime, '#ef4444', 1.5); 
                if (exactFermat.isVertex === false) drawRotatedTriangle(A, C, A_prime);
                
                if (exactFermat.isVertex === false) {
                    drawDot(exactFermat, '#ef4444', 5); 
                    drawText("O", exactFermat, {x: 8, y: -8}, '#ef4444');
                }
            }

            if (constructionStep >= 3) {
                drawPoly([A, B, B_prime], 'rgba(16, 185, 129, 0.1)'); 
                drawDot(B_prime, '#059669', 3); drawText("B'", B_prime, {x:5,y:5}, '#059669');
                drawLine(C, B_prime, '#ef4444', 1.5);
                if (exactFermat.isVertex === false) drawRotatedTriangle(B, A, B_prime);
            }
        }

        // Step 5
        if (step === 5) {
            drawLine(pPoint, A, '#3b82f6', 1.5);
            drawLine(pPoint, B, '#3b82f6', 1.5);
            drawLine(pPoint, C, '#3b82f6', 1.5);
            
            if (isogonicCenter) {
                drawDot(isogonicCenter, '#9ca3af', 4);
                drawText("O", isogonicCenter, {x:10,y:0}, '#9ca3af');
                ctx.setLineDash([4,4]);
                drawLine(A, isogonicCenter, '#cbd5e1');
                drawLine(B, isogonicCenter, '#cbd5e1');
                drawLine(C, isogonicCenter, '#cbd5e1');
                ctx.setLineDash([]);
            }

            drawDot(A, '#ef4444', 6);
            drawText("Min (A)", A, {x:-10, y:-30}, '#dc2626'); 

            const pColor = isOptimal ? '#059669' : '#2563eb';
            drawDot(pPoint, pColor, 6);
            drawText('P', pPoint, {x:10,y:0}, pColor);

            if (showObtuseProof) {
                const targetPt = A_prime; 
                const startNode = B;
                const drawPoly = (pts, color) => { ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); pts.forEach(p=>ctx.lineTo(p.x, p.y)); ctx.closePath(); ctx.fillStyle=color; ctx.fill(); ctx.strokeStyle=color.replace('0.1','1'); ctx.setLineDash([2,2]); ctx.lineWidth=1; ctx.stroke(); ctx.setLineDash([]); };
                drawPoly([A, C, A_prime], 'rgba(16, 185, 129, 0.1)'); 
                drawDot(A_prime, '#059669', 3); drawText("A'", A_prime, {x:5,y:5}, '#059669');

                drawLine(startNode, targetPt, '#ef4444', 1.5, [5,5]);

                const angAC = Math.atan2(A.y-C.y, A.x-C.x);
                const angACA_p = Math.atan2(targetPt.y-C.y, targetPt.x-C.x);
                const angleDiff = angACA_p - angAC;
                
                const pRot = rotatePointByAngle(pPoint, C, angleDiff);
                drawDot(pRot, '#2563eb', 4); drawText("P'", pRot, {x:5,y:5}, '#2563eb');

                ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(pPoint.x, pPoint.y); ctx.lineTo(C.x, C.y); ctx.closePath();
                ctx.fillStyle = 'rgba(59, 130, 246, 0.1)'; ctx.fill();

                ctx.beginPath(); ctx.moveTo(targetPt.x, targetPt.y); ctx.lineTo(pRot.x, pRot.y); ctx.lineTo(C.x, C.y); ctx.closePath();
                ctx.fillStyle = 'rgba(249, 115, 22, 0.2)'; ctx.fill();

                ctx.beginPath(); ctx.moveTo(startNode.x, startNode.y); ctx.lineTo(pPoint.x, pPoint.y);
                ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(pPoint.x, pPoint.y); ctx.lineTo(pRot.x, pRot.y);
                ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(pRot.x, pRot.y); ctx.lineTo(targetPt.x, targetPt.y);
                ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2; ctx.stroke();
            }
        }

        ctx.restore();
      }, [vertices, pPoint, step, isOptimal, rotationAngle, pivot, scale, offset, exactFermat, constructionStep, size, constructionPoints, showObtuseProof, isogonicCenter]);

      // --- 互動邏輯 ---
      const handleMouseDown = (e) => {
        const rect = canvasRef.current.getBoundingClientRect();
        const sx = e.clientX - rect.left;
        const sy = e.clientY - rect.top;
        const worldPt = screenToWorld(sx, sy);

        let hitTarget = null;

        const allowVertexDrag = step !== 5; 
        const allowPDrag = true; 

        if (allowPDrag && dist(worldPt, pPoint) < 30 / scale) hitTarget = 'P';
        else if (allowVertexDrag) {
             if (dist(worldPt, vertices.A) < 25 / scale) hitTarget = 'A';
             else if (dist(worldPt, vertices.B) < 25 / scale) hitTarget = 'B';
             else if (dist(worldPt, vertices.C) < 25 / scale) hitTarget = 'C';
        }

        if (hitTarget) {
            setIsDragging(hitTarget);
            setRecordWarning(''); 
        } else {
            setIsPanning(true);
            setLastPanPoint({ x: sx, y: sy });
        }
      };

      const handleMouseMove = (e) => {
        const rect = canvasRef.current.getBoundingClientRect();
        const sx = e.clientX - rect.left;
        const sy = e.clientY - rect.top;
        
        if (isPanning) {
            const dx = sx - lastPanPoint.x;
            const dy = sy - lastPanPoint.y;
            setOffset(prev => ({ x: prev.x + dx, y: prev.y + dy }));
            setLastPanPoint({ x: sx, y: sy });
            return;
        }

        if (!isDragging) return;
        const worldPt = screenToWorld(sx, sy);

        if(isDragging === 'P') {
            setPPoint({x: worldPt.x, y: worldPt.y});
        } else {
            setVertices(v => ({...v, [isDragging]:{x: worldPt.x, y: worldPt.y}}));
        }
      };
      
      const handleMouseUp = () => {
        setIsDragging(null);
        setIsPanning(false);
      };

      const handleTouchStart = (e) => {
        if (e.touches.length === 1) {
            const touch = e.touches[0];
            handleMouseDown({ clientX: touch.clientX, clientY: touch.clientY });
        }
      };

      const handleTouchMove = (e) => {
        if (e.touches.length === 1) {
            const touch = e.touches[0];
            handleMouseMove({ clientX: touch.clientX, clientY: touch.clientY });
        }

                                  <div className="text-xs text-blue-800 bg-blue-50 p-3 rounded border border-blue-100 animate-in fade-in">
                                      <p>觀察紅色的虛線 <span className="font-bold">B → A'</span>（這是理論上的最短路徑直線）。</p>
                                      <p className="mt-2">這條線沒有經過三角形內部！所以我們只能停在邊界上（頂點 A），這就是最好的解。</p>
                                  </div>
                              )}
                          </div>

                          <div className="mt-auto pt-4 border-t border-slate-100 flex justify-center">
                               <button onClick={handleReset} className="px-6 py-2 border border-slate-300 rounded-lg hover:bg-slate-50 font-bold text-slate-600 flex items-center gap-2">
                                  <RefreshCw size={16}/> 重新開始探究
                               </button>
                          </div>
                      </div>
                  )}
              </div>
          </div>
        </div>
      );
    };

    // 渲染應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FermatGuidedTour />);
  </script>
</body>
</html>
